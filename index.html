<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Funtubx AI Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#0b0f1a;
color:white;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.sidebar{
position:fixed;
left:0;
top:0;
height:100%;
width:220px;
background:#12182a;
padding:20px;
}

.sidebar h2{
font-family:Orbitron;
color:#6c63ff;
}

.menu{
margin-top:40px;
}

.menu button{
display:block;
width:100%;
margin-bottom:10px;
padding:10px;
background:#1a2140;
border:none;
color:white;
cursor:pointer;
border-radius:8px;
}

.menu button:hover{
background:#6c63ff;
}

.main{
margin-left:240px;
padding:40px;
}

.card{
background:#12182a;
padding:20px;
border-radius:12px;
max-width:700px;
}

textarea{
width:100%;
height:80px;
border-radius:8px;
border:none;
padding:10px;
margin-top:10px;
}

.generate{
margin-top:10px;
padding:12px 20px;
background:#6c63ff;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

.generate:hover{
background:#8a7fff;
}

.preview{
margin-top:20px;
}

.preview img{
max-width:100%;
border-radius:10px;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="sidebar">

<h2>Funtubx AI</h2>

<div class="menu">

<button>Dashboard</button>
<button>AI Image</button>
<button>AI Chat</button>
<button>AI Video</button>
<button>History</button>
<button>Account</button>

</div>

</div>

<div class="main">

<div class="card">

<h2>AI Image Generator</h2>

<textarea id="prompt" placeholder="Describe your image..."></textarea>

<button class="generate" onclick="generateImage()">Generate Image</button>

<div class="preview">
<img id="output">
</div>

</div>

</div>

<script>

function generateImage(){

let prompt=document.getElementById("prompt").value;

fetch("/api/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({prompt})
})
.then(res=>res.json())
.then(data=>{
document.getElementById("output").src=data.image;
})

}

</script>

<script>

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<100;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.5,
vy:(Math.random()-0.5)*0.5
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.x+=p.vx;
p.y+=p.vy;

ctx.fillStyle="#6c63ff";
ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fill();

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
