<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FunTubX AI Studio</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  background: linear-gradient(135deg,#0f172a,#1e1b4b);
  color:white;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:#111827;
}

.logo{
  font-size:22px;
  font-weight:bold;
}

.login-btn{
  background:linear-gradient(90deg,#8b5cf6,#6366f1);
  border:none;
  padding:8px 16px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* LAYOUT */
.layout{
  display:flex;
  min-height:calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#111827;
  padding:25px;
}

.sidebar p{
  margin:18px 0;
  cursor:pointer;
  transition:0.3s;
}

.sidebar p:hover{
  color:#8b5cf6;
}

/* MAIN */
.main{
  flex:1;
  padding:40px;
}

.main h2{
  margin-bottom:20px;
}

/* TEXTAREA */
textarea{
  width:100%;
  height:100px;
  border-radius:12px;
  border:none;
  padding:15px;
  font-size:16px;
  margin-bottom:20px;
}

/* BUTTON */
.generate-btn{
  padding:12px 25px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  background:linear-gradient(90deg,#8b5cf6,#6366f1);
  color:white;
  transition:0.3s;
}

.generate-btn:hover{
  transform:scale(1.05);
}

/* IMAGE GRID */
.grid{
  margin-top:30px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
}

.grid img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:12px;
  transition:0.3s;
}

.grid img:hover{
  transform:scale(1.05);
}

/* RESPONSIVE */
@media(max-width:768px){
  .layout{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    display:flex;
    justify-content:space-around;
  }

  .main{
    padding:20px;
  }
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">🚀 FunTubX AI</div>
  <button class="login-btn">Login</button>
</div>

<div class="layout">

  <div class="sidebar">
    <p>✨ Generate</p>
    <p>🕘 History</p>
    <p>⭐ Favorites</p>
    <p>⚙ Settings</p>
  </div>

  <div class="main">
    <h2>AI Image Generator</h2>

    <textarea placeholder="Describe your image..."></textarea>

    <button class="generate-btn" onclick="generateImages()">Generate</button>

    <div class="grid" id="imageGrid"></div>
  </div>

</div>

<script>
function generateImages(){
  const grid = document.getElementById("imageGrid");
  grid.innerHTML = "";

  for(let i=1;i<=4;i++){
    let img = document.createElement("img");
    img.src = "https://picsum.photos/400?random=" + Math.random();
    grid.appendChild(img);
  }
}
</script>

</body>
</html>
