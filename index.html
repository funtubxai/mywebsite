<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>Funtubx AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      background: linear-gradient(45deg, #7c3aed, #9333ea);
      color: white;
    }

    .container {
      margin-top: 40px;
      padding: 20px;
    }

    textarea {
      width: 90%;
      max-width: 500px;
      height: 100px;
      border-radius: 10px;
      padding: 10px;
      border: none;
      font-size: 16px;
    }

    .generate-btn {
      margin-top: 15px;
    }

    img {
      margin-top: 25px;
      max-width: 90%;
      border-radius: 15px;
    }

    #logoutBtn {
      display: none;
      margin-left: 10px;
      background: crimson;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">🚀 ফানটুবক্স এআই</div>
  <div>
    <button class="btn" onclick="googleLogin()">লগইন</button>
    <button class="btn" id="logoutBtn" onclick="logoutUser()">লগআউট</button>
  </div>
</header>

<div class="container">
  <h2>এআই ইমেজ জেনারেটর</h2>
  <textarea id="promptInput" placeholder="যেমন: সুন্দর কুকুর"></textarea>
  <br>
  <button class="btn generate-btn" onclick="generateImage()">উৎপন্ন করুন</button>

  <div>
    <img id="resultImage" src="">
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBSafcrzkEn61j31wmPFzNmOn_44yJd6Sc",
  authDomain: "funtubx-ai.firebaseapp.com",
  projectId: "funtubx-ai",
  storageBucket: "funtubx-ai.firebasestorage.app",
  messagingSenderId: "865993292255",
  appId: "1:865993292255:web:2650328993de0923ca2c6a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// Login
window.googleLogin = function () {
  signInWithRedirect(auth, provider);
};

// Logout
window.logoutUser = function () {
  signOut(auth);
};

// Handle redirect result
getRedirectResult(auth).catch((error) => {
  console.error(error);
});

// Detect login state
onAuthStateChanged(auth, (user) => {
  if (user) {
    alert("Login Successful 🎉");
    document.getElementById("logoutBtn").style.display = "inline-block";
  }
});

// Simple demo image generator
window.generateImage = function () {
  const prompt = document.getElementById("promptInput").value;
  if (!prompt) return alert("প্রম্পট লিখুন");

  document.getElementById("resultImage").src =
    "https://source.unsplash.com/600x400/?" + prompt;
};

</script>

</body>
</html>
