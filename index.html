<!DOCTYPE html>
<html>
<head>
<title>Funtubx AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:#020617;
padding:20px;
}

.sidebar h2{
color:#38bdf8;
}

.sidebar a{
display:block;
color:#94a3b8;
margin:15px 0;
text-decoration:none;
}

.main{
flex:1;
padding:40px;
}

textarea{
width:100%;
height:100px;
border-radius:10px;
border:none;
padding:15px;
font-size:16px;
}

button{
margin-top:15px;
padding:12px 25px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.image-grid{
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:20px;
}

.image-grid img{
width:100%;
border-radius:10px;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>Funtubx AI</h2>

<a href="#">Dashboard</a>
<a href="#">Generate</a>
<a href="#">History</a>
<a href="#">Account</a>

</div>

<div class="main">

<h1>AI Image Generator</h1>

<textarea id="prompt" placeholder="Describe your image..."></textarea>

<br>

<button onclick="generateImage()">
Generate Image
</button>

<div id="loader" style="display:none;margin-top:20px;">
Generating image...
</div>

<div class="image-grid" id="results"></div>

</div>

<script>

async function generateImage(){

const prompt=document.getElementById("prompt").value;

document.getElementById("loader").style.display="block";

const res=await fetch("/.netlify/functions/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt})
});

const data=await res.json();

document.getElementById("loader").style.display="none";

const container=document.getElementById("results");

container.innerHTML="";

data.data.forEach(img=>{

const card=document.createElement("div");

card.innerHTML=`
<img src="${img.url}">
<br>
<a href="${img.url}" download target="_blank">
<button>Download</button>
</a>
`;

container.appendChild(card);

});

}

</script>

</body>
</html>
