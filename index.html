<!DOCTYPE html>
<html>
<head>
  <title>Funtubx AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      color:white;
      text-align:center;
    }

    .container{
      margin-top:60px;
      padding:20px;
    }

    textarea{
      width:90%;
      height:120px;
      border-radius:10px;
      border:none;
      padding:10px;
      font-size:16px;
    }

    button{
      padding:12px 25px;
      border:none;
      border-radius:8px;
      margin-top:15px;
      font-size:16px;
      cursor:pointer;
    }

    .login-btn{
      background:linear-gradient(45deg,#ff00cc,#3333ff);
      color:white;
    }

    .generate-btn{
      background:linear-gradient(45deg,#00c6ff,#0072ff);
      color:white;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🚀 Funtubx AI</h1>

  <button class="login-btn" onclick="googleLogin()">Login with Google</button>

  <br><br>

  <h2>AI Image Generator</h2>

  <textarea placeholder="Example: A futuristic city in 2077"></textarea>

  <br>

  <button class="generate-btn">Generate Image</button>

  <div id="userInfo"></div>

</div>

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { 
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  getRedirectResult,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


// 🔥 YOUR REAL FIREBASE CONFIG (FROM PROJECT SETTINGS)
const firebaseConfig = {
  apiKey: "AIzaSyBRgNnpNRr53wEnwFMm2X_gQWxSCu3iVgM",
  authDomain: "funtubx-ai.firebaseapp.com",
  projectId: "funtubx-ai",
  storageBucket: "funtubx-ai.appspot.com",
  messagingSenderId: "865993292255",
  appId: "1:865993292255:web:2650328993de0923ca2c6a",
  measurementId: "G-XFPKW8Q23F"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.googleLogin = function(){
  signInWithRedirect(auth, provider);
};

getRedirectResult(auth)
.then((result) => {
  if(result){
    console.log("Logged in:", result.user);
  }
})
.catch((error) => {
  alert("Login Error: " + error.message);
});

onAuthStateChanged(auth, (user) => {
  const userInfo = document.getElementById("userInfo");

  if(user){
    userInfo.innerHTML = `
      <p>Welcome, ${user.displayName}</p>
      <button onclick="logoutUser()">Logout</button>
    `;
  }else{
    userInfo.innerHTML = "";
  }
});

window.logoutUser = function(){
  signOut(auth);
};

</script>

</body>
</html>
