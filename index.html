<!DOCTYPE html>
<html>
<head>
<title>Funtubx AI Studio</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:#020617;
padding:20px;
}

.sidebar h2{
color:#38bdf8;
}

.sidebar a{
display:block;
margin:15px 0;
color:#94a3b8;
text-decoration:none;
cursor:pointer;
}

.main{
flex:1;
padding:40px;
}

textarea{
width:100%;
height:100px;
border-radius:10px;
border:none;
padding:15px;
font-size:16px;
}

button{
margin-top:15px;
padding:12px 25px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.image-grid{
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:20px;
}

.image-grid img{
width:100%;
border-radius:10px;
}

.chatbox{
background:#020617;
padding:15px;
border-radius:10px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Funtubx AI</h2>

<a onclick="showImage()">Image AI</a>
<a onclick="showChat()">Chat AI</a>

</div>

<div class="main">

<h3>Credits: <span id="creditCount"></span></h3>

<div id="imageTool">

<h1>AI Image Generator</h1>

<textarea id="prompt" placeholder="Describe your image"></textarea>

<button onclick="generateImage()">Generate Image</button>

<div id="loader" style="display:none;">Generating...</div>

<div class="image-grid" id="results"></div>

</div>


<div id="chatTool" style="display:none;">

<h1>Chat AI</h1>

<textarea id="chatInput" placeholder="Ask AI anything"></textarea>

<button onclick="askAI()">Ask AI</button>

<div id="chatResult" class="chatbox"></div>

</div>

</div>

<script>

let credits = localStorage.getItem("credits");

if(!credits){
credits=10;
localStorage.setItem("credits",credits);
}

document.getElementById("creditCount").innerText=credits;


function showImage(){
document.getElementById("imageTool").style.display="block";
document.getElementById("chatTool").style.display="none";
}

function showChat(){
document.getElementById("imageTool").style.display="none";
document.getElementById("chatTool").style.display="block";
}


async function generateImage(){

let credits=localStorage.getItem("credits");

if(credits<=0){
alert("No credits left");
return;
}

const prompt=document.getElementById("prompt").value;

document.getElementById("loader").style.display="block";

const res=await fetch("/.netlify/functions/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt})
});

const data=await res.json();

document.getElementById("loader").style.display="none";

const container=document.getElementById("results");

container.innerHTML="";

data.data.forEach(img=>{

const card=document.createElement("div");

card.innerHTML=`
<img src="${img.url}">
`;

container.appendChild(card);

});

credits--;

localStorage.setItem("credits",credits);

document.getElementById("creditCount").innerText=credits;

}


async function askAI(){

let credits=localStorage.getItem("credits");

if(credits<=0){
alert("No credits left");
return;
}

const question=document.getElementById("chatInput").value;

const res=await fetch("/.netlify/functions/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({question})
});

const data=await res.json();

document.getElementById("chatResult").innerText=data.reply;

credits--;

localStorage.setItem("credits",credits);

document.getElementById("creditCount").innerText=credits;

}

</script>

</body>
</html>
