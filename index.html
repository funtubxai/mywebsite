<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FunTubX AI Studio</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  color: white;
  box-shadow: 0 0 25px rgba(0, 0, 0, 0.6);
}

h1 {
  margin-bottom: 20px;
  font-size: 22px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 15px;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #8e2de2, #4a00e0);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #8e2de2;
}

#result {
  margin-top: 20px;
}

img {
  width: 100%;
  border-radius: 15px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🚀 FunTubX AI Studio</h1>
  <input type="text" id="prompt" placeholder="Enter your AI prompt...">
  <button onclick="generateImage()">Generate AI Image</button>
  <div id="result"></div>
</div>

<script>
async function generateImage() {
  const prompt = document.getElementById("prompt").value;
  const resultDiv = document.getElementById("result");

  resultDiv.innerHTML = "⏳ Generating...";

  const response = await fetch("/.netlify/functions/generate", {
    method: "POST",
    body: JSON.stringify({ prompt: prompt })
  });

  const data = await response.json();

  if (data.image) {
    resultDiv.innerHTML = "<img src='" + data.image + "'>";
  } else {
    resultDiv.innerHTML = "❌ Error generating image";
  }
}
</script>

</body>
</html>
