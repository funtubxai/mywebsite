<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FunTubX AI Studio</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: #111827;
  align-items: center;
}

.navbar h2 {
  margin: 0;
}

.navbar button {
  background: #6366f1;
  border: none;
  padding: 8px 15px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

/* Layout */
.layout {
  display: flex;
  height: calc(100vh - 60px);
}

/* Sidebar */
.sidebar {
  width: 200px;
  background: #111827;
  padding: 20px;
}

.sidebar p {
  margin: 15px 0;
  cursor: pointer;
}

/* Main */
.main {
  flex: 1;
  padding: 30px;
}

textarea {
  width: 100%;
  height: 80px;
  border-radius: 10px;
  border: none;
  padding: 10px;
  margin-bottom: 15px;
}

.generate-btn {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(90deg,#8b5cf6,#6366f1);
  color: white;
  cursor: pointer;
}

/* Image Grid */
.grid {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(150px,1fr));
  gap: 15px;
}

.grid img {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="navbar">
  <h2>🚀 FunTubX AI</h2>
  <button>Login</button>
</div>

<div class="layout">
  <div class="sidebar">
    <p>✨ Generate</p>
    <p>🕘 History</p>
    <p>⭐ Favorites</p>
    <p>⚙ Settings</p>
  </div>

  <div class="main">
    <h3>AI Image Generator</h3>
    <textarea placeholder="Describe your image..."></textarea>
    <button class="generate-btn">Generate</button>

    <div class="grid">
      <img src="https://via.placeholder.com/300">
      <img src="https://via.placeholder.com/300">
      <img src="https://via.placeholder.com/300">
      <img src="https://via.placeholder.com/300">
    </div>
  </div>
</div>

</body>
</html>
