<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funtubx AI</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
}

.logo{
  font-size:22px;
  font-weight:bold;
}

button{
  padding:10px 18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.login-btn{
  background:linear-gradient(45deg,#7b2ff7,#f107a3);
  color:white;
}

.logout-btn{
  background:#ff4d4d;
  color:white;
  display:none;
}

.container{
  margin-top:40px;
}

textarea{
  width:85%;
  max-width:500px;
  height:120px;
  border-radius:10px;
  border:none;
  padding:15px;
  font-size:16px;
}

.generate-btn{
  margin-top:15px;
  background:linear-gradient(45deg,#7b2ff7,#f107a3);
  color:white;
}

#userInfo{
  margin-top:15px;
  font-size:14px;
}
</style>
</head>

<body>

<header>
<div class="logo">🚀 Funtubx AI</div>
<div>
<button class="login-btn" onclick="googleLogin()">Login</button>
<button class="logout-btn" onclick="logoutUser()">Logout</button>
</div>
</header>

<div class="container">
<h2>AI Image Generator</h2>
<textarea placeholder="Example: beautiful dog"></textarea><br>
<button class="generate-btn">Generate</button>
<div id="userInfo"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBSafcrzkEn61j31wmPFzNmOn_44yJd6Sc",
  authDomain: "funtubx-ai.firebaseapp.com",
  projectId: "funtubx-ai",
  storageBucket: "funtubx-ai.firebasestorage.app",
  messagingSenderId: "865993292255",
  appId: "1:865993292255:web:2650328993de0923ca2c6a",
  measurementId: "G-XFPKW8Q23F"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// Popup login logic for better mobile compatibility
window.googleLogin = function(){
  signInWithPopup(auth, provider)
    .then((result) => {
      console.log("Logged in!");
    }).catch((error) => {
      alert("Login failed: " + error.message);
    });
};

window.logoutUser = function(){
  signOut(auth);
};

onAuthStateChanged(auth, (user)=>{
  const loginBtn = document.querySelector(".login-btn");
  const logoutBtn = document.querySelector(".logout-btn");
  const userInfo = document.getElementById("userInfo");

  if(user){
    loginBtn.style.display="none";
    logoutBtn.style.display="inline-block";
    userInfo.innerHTML = "Logged in as: " + user.displayName;
  }else{
    loginBtn.style.display="inline-block";
    logoutBtn.style.display="none";
    userInfo.innerHTML = "";
  }
});
</script>

</body>
</html>
