<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Funtubx AI Studio</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* Sidebar */

.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#020617;
padding:20px;
}

.sidebar h2{
color:#38bdf8;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar li{
padding:10px 0;
cursor:pointer;
}

/* Main */

.main{
margin-left:240px;
padding:20px;
}

/* Prompt box */

textarea{
width:100%;
height:80px;
background:#1e293b;
border:none;
color:white;
padding:10px;
}

button{
background:#38bdf8;
border:none;
padding:10px 20px;
margin-top:10px;
cursor:pointer;
}

/* Image grid */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

.grid img{
width:100%;
border-radius:8px;
}

/* Background animation */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%, #38bdf8 1px, transparent 1px),
radial-gradient(circle at 80% 80%, #38bdf8 1px, transparent 1px);
background-size:60px 60px;
opacity:0.2;
animation:move 20s linear infinite;
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(-100px);}
}

</style>
</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h2>Funtubx AI</h2>

<ul>
<li>AI Image</li>
<li>AI Video</li>
<li>AI Chat</li>
<li>YouTube Studio</li>
<li>History</li>
</ul>

</div>


<!-- Main -->

<div class="main">

<h2>AI Image Generator</h2>

<textarea id="prompt" placeholder="Describe your image..."></textarea>

<br>

<select id="style">
<option>Cinematic</option>
<option>Realistic</option>
<option>Anime</option>
<option>3D Render</option>
</select>

<br>

<button onclick="generate()">Generate</button>


<div class="grid" id="images"></div>

</div>


<script>

function generate(){

let prompt=document.getElementById("prompt").value

let grid=document.getElementById("images")

grid.innerHTML="Generating..."

/* demo images */

setTimeout(()=>{

grid.innerHTML=`

<img src="https://picsum.photos/400?1">
<img src="https://picsum.photos/400?2">
<img src="https://picsum.photos/400?3">
<img src="https://picsum.photos/400?4">

`

},1000)

}

</script>

</body>
</html>
