<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Funtubx AI Studio</title><style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* Sidebar */

.sidebar{
position:fixed;
left:0;
top:0;
width:230px;
height:100%;
background:#020617;
padding:20px;
}

.sidebar h2{
color:#38bdf8;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar li{
padding:12px 0;
cursor:pointer;
border-bottom:1px solid #1e293b;
}

/* Main */

.main{
margin-left:250px;
padding:20px;
}

/* Prompt */

textarea{
width:100%;
height:80px;
background:#1e293b;
border:none;
color:white;
padding:10px;
border-radius:6px;
}

/* Buttons */

button{
background:#38bdf8;
border:none;
padding:10px 18px;
margin-top:10px;
cursor:pointer;
border-radius:6px;
}

/* Grid */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

.card{
background:#020617;
padding:10px;
border-radius:8px;
}

.card img{
width:100%;
border-radius:6px;
}

/* Download */

.download{
background:#22c55e;
margin-top:5px;
}

/* Prompt templates */

.templates button{
background:#1e293b;
margin:5px;
}

/* History */

.history{
margin-top:30px;
background:#020617;
padding:10px;
border-radius:8px;
}

/* Background animation */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 30% 30%, #38bdf8 1px, transparent 1px),
radial-gradient(circle at 70% 70%, #38bdf8 1px, transparent 1px);
background-size:60px 60px;
opacity:0.2;
animation:move 20s linear infinite;
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(-100px);}
}

</style></head><body><div class="sidebar"><h2>Funtubx AI</h2><ul>
<li>AI Image</li>
<li>AI Video</li>
<li>AI Chat</li>
<li>YouTube Studio</li>
<li>History</li>
</ul></div><div class="main"><h2>AI Image Generator</h2><textarea id="prompt" placeholder="Describe your image..."></textarea><br><select id="style">
<option>Cinematic</option>
<option>Realistic</option>
<option>Anime</option>
<option>3D Render</option>
</select><br><button onclick="generate()">Generate Image</button>

<!-- Prompt Templates --><div class="templates"><h3>Prompt Templates</h3><button onclick="template('cyberpunk city at night cinematic')">Cyberpunk</button>
<button onclick="template('anime warrior ultra detailed')">Anime</button>
<button onclick="template('futuristic robot cinematic lighting')">Robot</button>

</div><!-- Image Grid --><div class="grid" id="images"></div><!-- History --><div class="history"><h3>History</h3><div id="history"></div></div></div><script>

function template(text){
document.getElementById("prompt").value=text
}

function generate(){

let prompt=document.getElementById("prompt").value

let grid=document.getElementById("images")

grid.innerHTML="Generating..."

setTimeout(()=>{

let html=""

for(let i=0;i<4;i++){

let img="https://picsum.photos/400?random="+Math.random()

html+=`

<div class="card">
<img src="${img}">
<button class="download">Download</button>
</div>

`

}

grid.innerHTML=html

document.getElementById("history").innerHTML+=
"<div>"+prompt+"</div>"

},1000)

}

</script></body>
</html>
